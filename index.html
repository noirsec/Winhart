<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>WINHART RADIO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:#0b0b0b;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* LEFT */
.left{
flex:2;
padding:25px;
overflow:auto;
}

/* RIGHT (CHAT) */
.right{
flex:1;
background:#111;
padding:20px;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
margin-bottom:20px;
}

.onair{
color:#ff0040;
font-weight:bold;
}

/* PLAYER */
.player{
background:#181818;
padding:20px;
border-radius:15px;
margin-bottom:25px;
}

button{
padding:10px 20px;
background:#1db954;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
margin-right:10px;
}

/* GRID CREW */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.card{
background:#181818;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:8px;
}

/* CHAT */
.chatbox{
flex:1;
overflow:auto;
background:#000;
padding:10px;
border-radius:10px;
margin-bottom:10px;
font-size:14px;
}

.chatbox p{
margin:5px 0;
}

input{
width:100%;
padding:10px;
margin-top:8px;
background:#222;
border:none;
color:white;
border-radius:6px;
}

</style>
</head>

<body>

<!-- LEFT -->
<div class="left">

<div class="header">
<h1>WINHART RADIO</h1>
<p class="onair">🔴 ON AIR</p>
<p>Listeners: <span id="listenerCount">0</span></p>
</div>

<!-- PLAYER -->
<div class="player">
<h3 id="nowPlaying">Loading...</h3>
<button onclick="startRadio()">PLAY</button>
<button onclick="pauseRadio()">PAUSE</button>
</div>

<!-- CREW -->
<h2>Radio Crew</h2>

<div class="grid">

<div class="card"><img src="Andi.jpg"><p>Andy Hartanto</p></div>
<div class="card"><img src="Sheryl.jpg"><p>Sheryl</p></div>
<div class="card"><img src="Rina.jpg"><p>Miss Selena</p></div>
<div class="card"><img src="Nandar.jpg"><p>Kang Nandar</p></div>
<div class="card"><img src="Denis.jpg"><p>Kang Denis</p></div>

</div>

</div>

<!-- RIGHT CHAT -->
<div class="right">

<h3>Live Chat</h3>

<div class="chatbox" id="chatbox"></div>

<input id="username" placeholder="Nama">
<input id="message" placeholder="Pesan">
<button onclick="sendChat()">Kirim</button>

</div>

<audio id="radioPlayer"></audio>

<script type="module">

/* FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyBCwucuNtJnzFWXSqfwbK0_mti2sFH6ySk",
databaseURL:"https://winhart-radio-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);

/* LISTENER */
const userId = Date.now();

set(ref(db,"listeners/"+userId),true);

window.addEventListener("beforeunload",()=>{
set(ref(db,"listeners/"+userId),null);
});

onValue(ref(db,"listeners"),snap=>{
let val = snap.val() || {};
document.getElementById("listenerCount").innerText = Object.keys(val).length;
});

/* CHAT */
window.sendChat=function(){
push(ref(db,"chat"),{
user:username.value,
msg:message.value
});
message.value="";
}

onChildAdded(ref(db,"chat"),data=>{
let v=data.val();
chatbox.innerHTML+=`<p><b>${v.user}</b>: ${v.msg}</p>`;
chatbox.scrollTop=chatbox.scrollHeight;
});

/* AUTO DJ */
let playlist=[];
let titles=[];
let track=0;

fetch("https://api.github.com/repos/noirsec/Winhart/contents/")
.then(r=>r.json())
.then(data=>{
data.forEach(file=>{
if(file.name.endsWith(".mp3")){
playlist.push(file.download_url);
titles.push(file.name.replace(".mp3",""));
}
});
document.getElementById("nowPlaying").innerText="Klik PLAY";
});

const player=document.getElementById("radioPlayer");

function playTrack(){
if(playlist.length===0)return;

player.src=playlist[track];
player.play();

document.getElementById("nowPlaying").innerText="Now Playing: "+titles[track];
}

window.startRadio=playTrack;

window.pauseRadio=()=>player.pause();

player.addEventListener("ended",()=>{
track++;
if(track>=playlist.length)track=0;
playTrack();
});

</script>

</body>
</html>
