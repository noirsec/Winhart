<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>WINHART RADIO PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:#0b0b0b;
color:white;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:230px;
background:#000;
height:100vh;
padding:20px;
}

.sidebar img{width:100%;margin-bottom:20px;}
.sidebar a{display:block;color:#aaa;margin:10px 0;text-decoration:none;}
.sidebar a:hover{color:white}

/* MAIN */
.main{
flex:1;
padding:30px;
overflow:auto;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* CARD */
.card{
background:#181818;
padding:15px;
border-radius:10px;
}

/* PLAYER BAR */
.playerbar{
position:fixed;
bottom:0;
left:230px;
right:0;
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.controls button{
padding:10px 15px;
background:#1db954;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

/* CHAT */
.chatbox{
height:200px;
overflow:auto;
background:#000;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
background:#111;
border:none;
color:white;
border-radius:6px;
}

/* ON AIR */
.onair{
color:#ff0040;
font-weight:bold;
}

.listeners{
color:#1db954;
}
</style>
</head>

<body>

<div class="sidebar">
<img src="Logo.jpg">
<a>🏠 Home</a>
<a>📻 Live</a>
<a>👥 Crew</a>
<a>💬 Chat</a>
</div>

<div class="main">

<h1>WINHART RADIO</h1>
<p>Indie Pop • EDM • 24/7 Streaming</p>

<br>

<h2 class="onair">🔴 ON AIR LIVE</h2>
<p class="listeners">Listeners: <span id="listenerCount">0</span></p>

<br>

<h2>🎧 Radio Crew</h2>

<div class="grid">

<div class="card"><img src="Andi.jpg"><h3>Andy Hartanto</h3></div>
<div class="card"><img src="Sheryl.jpg"><h3>Sheryl</h3></div>
<div class="card"><img src="Rina.jpg"><h3>Miss Selena</h3></div>
<div class="card"><img src="Nandar.jpg"><h3>Kang Nandar</h3></div>
<div class="card"><img src="Denis.jpg"><h3>Kang Denis</h3></div>

</div>

<br><br>

<h2>💬 Live Chat</h2>

<div class="chatbox" id="chatbox"></div>

<input id="username" placeholder="Nama">
<input id="message" placeholder="Pesan">

<button onclick="sendChat()">Kirim</button>

</div>

<div class="playerbar">

<div>
<strong>WINHART RADIO</strong><br>
<span id="nowPlaying">Loading...</span>
</div>

<div class="controls">
<button onclick="startRadio()">▶</button>
<button onclick="pauseRadio()">❚❚</button>
</div>

</div>

<audio id="radioPlayer"></audio>

<script type="module">

/* FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyBCwucuNtJnzFWXSqfwbK0_mti2sFH6ySk",
databaseURL:"https://winhart-radio-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);

/* LISTENER COUNT */
const userId = Date.now();

set(ref(db,"listeners/"+userId),true);

window.addEventListener("beforeunload",()=>{
set(ref(db,"listeners/"+userId),null);
});

onValue(ref(db,"listeners"),snap=>{
document.getElementById("listenerCount").innerText =
snap.size || Object.keys(snap.val()||{}).length;
});

/* CHAT */
window.sendChat=function(){
push(ref(db,"chat"),{
user:username.value,
msg:message.value
});
message.value="";
}

onChildAdded(ref(db,"chat"),data=>{
let v=data.val();
chatbox.innerHTML+=`<p><b>${v.user}</b>: ${v.msg}</p>`;
chatbox.scrollTop=chatbox.scrollHeight;
});

/* AUTO DJ FROM GITHUB */
let playlist=[];
let titles=[];
let track=0;

fetch("https://api.github.com/repos/noirsec/Winhart/contents/")
.then(r=>r.json())
.then(data=>{
data.forEach(file=>{
if(file.name.endsWith(".mp3")){
playlist.push(file.download_url);
titles.push(file.name.replace(".mp3",""));
}
});
document.getElementById("nowPlaying").innerText="Klik Play";
});

const player=document.getElementById("radioPlayer");

function playTrack(){
if(playlist.length===0)return;

player.src=playlist[track];
player.play().catch(()=>{});

document.getElementById("nowPlaying").innerText="Now Playing: "+titles[track];
}

window.startRadio=playTrack;

window.pauseRadio=()=>player.pause();

player.addEventListener("ended",()=>{
track++;
if(track>=playlist.length)track=0;
playTrack();
});

</script>

</body>
</html>
