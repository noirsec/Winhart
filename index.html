<body>

<nav>

<img src="Logo.jpg">

<div>

<a href="#radio">Live</a>
<a href="#schedule">Schedule</a>
<a href="#crew">Crew</a>
<a href="#request">Request</a>
<a href="#chat">Chat</a>

</div>

</nav>

<header>

<img src="Logo.jpg">

<h1>WINHART RADIO</h1>

<p>Indie Pop • EDM • Lifestyle Broadcast</p>

</header>

<section class="section" id="radio">

<h2>LIVE RADIO</h2>

<div class="card" style="text-align:center">

<h3 id="nowPlaying">Now Playing : -</h3>

<audio id="radioPlayer">
<source id="radioSource">
</audio>

<canvas id="visualizer" width="600" height="120"></canvas>

</div>

</section>

<!-- schedule crew request chat tetap sama seperti script Anda -->

<footer>

© 2026 WINHART RADIO

</footer>

<div class="playerbar">

<button onclick="startRadio()">▶ PLAY</button>
<button onclick="pauseRadio()">❚❚ PAUSE</button>

<span id="miniNow">OFF AIR</span>
<span id="listeners">Listeners: 0</span>

</div>

<script>

var playlist=[
"Winhart intro.mp4",
"Kamu Adalah Cahaya",
"Kembali Ke Rumah"
];

var titles=[
"Intro WINHART Radio",
"Kamu Adalah Cahaya",
"Kembali Ke Rumah"
];

var radioID="winhart-id.mp3";

var track=0;
var songCount=0;

function startRadio(){

var player=document.getElementById("radioPlayer");
var source=document.getElementById("radioSource");

source.src=playlist[track];

player.load();
player.play();

document.getElementById("nowPlaying").innerText="Now Playing : "+titles[track];
document.getElementById("miniNow").innerText=titles[track];

}

function pauseRadio(){

document.getElementById("radioPlayer").pause();

}

var player=document.getElementById("radioPlayer");

player.addEventListener("ended",function(){

songCount++;

if(songCount==4){

document.getElementById("radioSource").src=radioID;

document.getElementById("nowPlaying").innerText="WINHART RADIO ID";
document.getElementById("miniNow").innerText="WINHART RADIO ID";

songCount=0;

}else{

track++;

if(track>=playlist.length){
track=0;
}

document.getElementById("radioSource").src=playlist[track];

document.getElementById("nowPlaying").innerText="Now Playing : "+titles[track];
document.getElementById("miniNow").innerText=titles[track];

}

player.load();
player.play();

});

function sendRequest(){

var name=document.getElementById("reqname").value;
var song=document.getElementById("reqsong").value;

document.getElementById("status").innerText="Request terkirim: "+song+" oleh "+name;

}

function sendChat(){

var user=document.getElementById("username").value;
var msg=document.getElementById("message").value;

var time=new Date().toLocaleTimeString();

var box=document.getElementById("chatbox");

box.innerHTML+="<p><b>"+user+"</b> <small>"+time+"</small><br>"+msg+"</p>";

box.scrollTop=box.scrollHeight;

}

let listeners=20;

setInterval(function(){

let change=Math.floor(Math.random()*6)-3;

listeners+=change;

if(listeners<10)listeners=10;
if(listeners>120)listeners=120;

document.getElementById("listeners").innerText="Listeners: "+listeners;

},4000);

document.querySelectorAll('nav a').forEach(anchor=>{
anchor.addEventListener('click',function(e){
e.preventDefault();
document.querySelector(this.getAttribute('href')).scrollIntoView({
behavior:'smooth'
});
});
});

</script>

<script>

const audio = document.getElementById("radioPlayer");

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const analyser = audioCtx.createAnalyser();

const sourceNode = audioCtx.createMediaElementSource(audio);

sourceNode.connect(analyser);
analyser.connect(audioCtx.destination);

analyser.fftSize = 128;

const canvas = document.getElementById("visualizer");
const ctx = canvas.getContext("2d");

const bufferLength = analyser.frequencyBinCount;
const dataArray = new Uint8Array(bufferLength);

function draw(){

requestAnimationFrame(draw);

analyser.getByteFrequencyData(dataArray);

ctx.fillStyle="#000";
ctx.fillRect(0,0,canvas.width,canvas.height);

let barWidth=(canvas.width/bufferLength)*2;
let barHeight;
let x=0;

for(let i=0;i<bufferLength;i++){

barHeight=dataArray[i];

ctx.fillStyle="rgb(229,"+(barHeight+50)+",20)";
ctx.fillRect(x,canvas.height-barHeight/2,barWidth,barHeight/2);

x+=barWidth+1;

}

}

draw();

</script>
