<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WINHART RADIO APP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:linear-gradient(180deg,#0b0b0b,#121212);
color:white;
}

/* APP CONTAINER */
.app{
max-width:500px;
margin:auto;
padding:20px;
}

/* COVER */
.cover{
width:100%;
height:260px;
border-radius:15px;
background:#222;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
text-align:center;
margin-bottom:20px;
}

/* TITLE */
.title{
font-size:18px;
margin-bottom:5px;
}

.artist{
font-size:13px;
color:#aaa;
margin-bottom:15px;
}

/* PROGRESS */
.progress{
width:100%;
height:5px;
background:#333;
border-radius:5px;
overflow:hidden;
margin-bottom:15px;
}

.progress-bar{
height:100%;
width:0%;
background:#1db954;
}

/* CONTROLS */
.controls{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:20px;
}

button{
padding:12px 18px;
background:#1db954;
border:none;
border-radius:50px;
color:white;
cursor:pointer;
}

/* VISUALIZER */
.visualizer{
display:flex;
justify-content:center;
align-items:flex-end;
gap:3px;
height:40px;
margin-bottom:20px;
}

.bar{
width:4px;
background:#1db954;
height:10px;
animation:beat 1s infinite;
}

.bar:nth-child(2){animation-delay:.2s;}
.bar:nth-child(3){animation-delay:.4s;}
.bar:nth-child(4){animation-delay:.6s;}
.bar:nth-child(5){animation-delay:.8s;}

@keyframes beat{
0%,100%{height:10px;}
50%{height:35px;}
}

/* CHAT */
.chat{
background:#111;
padding:10px;
border-radius:10px;
height:200px;
overflow:auto;
margin-bottom:10px;
}

.chat p{
background:#1a1a1a;
padding:6px;
border-radius:6px;
margin:5px 0;
font-size:12px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
background:#222;
border:none;
color:white;
border-radius:6px;
}

/* DESKTOP */
@media(min-width:768px){
.app{
max-width:900px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}
}

</style>
</head>

<body>

<div class="app">

<!-- LEFT -->
<div>

<div class="cover" id="cover">WINHART RADIO</div>

<div class="title" id="title">Loading...</div>
<div class="artist">Auto DJ • Live 24/7</div>

<div class="progress">
<div class="progress-bar" id="progress"></div>
</div>

<div class="controls">
<button onclick="startRadio()">▶</button>
<button onclick="pauseRadio()">❚❚</button>
</div>

<div class="visualizer">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

</div>

<!-- RIGHT -->
<div>

<h3>💬 Live Chat</h3>

<div class="chat" id="chatbox"></div>

<input id="username" placeholder="Nama">
<input id="message" placeholder="Pesan">
<button onclick="sendChat()">Kirim</button>

</div>

</div>

<audio id="player"></audio>

<script type="module">

/* FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyBCwucuNtJnzFWXSqfwbK0_mti2sFH6ySk",
databaseURL:"https://winhart-radio-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);

/* CHAT */
window.sendChat=function(){
if(!username.value||!message.value)return;

push(ref(db,"chat"),{
user:username.value,
msg:message.value
});

message.value="";
}

onChildAdded(ref(db,"chat"),data=>{
let v=data.val();
chatbox.innerHTML+=`<p><b>${v.user}</b>: ${v.msg}</p>`;
chatbox.scrollTop=chatbox.scrollHeight;
});

/* AUTO DJ */
let playlist=[];
let titles=[];
let i=0;

fetch("https://api.github.com/repos/noirsec/Winhart/contents/")
.then(r=>r.json())
.then(data=>{
data.forEach(f=>{
if(f.name.endsWith(".mp3")){
playlist.push(f.download_url);
titles.push(f.name.replace(".mp3",""));
}
});
title.innerText="Klik Play";
});

const player=document.getElementById("player");

/* PLAY */
function playTrack(){
if(!playlist.length)return;

player.src=playlist[i];
player.play();

title.innerText=titles[i];
cover.innerText=titles[i];
}

window.startRadio=playTrack;
window.pauseRadio=()=>player.pause();

/* NEXT AUTO */
player.addEventListener("ended",()=>{
i++;
if(i>=playlist.length)i=0;
playTrack();
});

/* PROGRESS */
player.ontimeupdate=()=>{
let percent=(player.currentTime/player.duration)*100;
progress.style.width=percent+"%";
};

</script>

</body>
</html>
