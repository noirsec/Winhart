<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WINHART RADIO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
background:#0b0b0b;
color:white;
}

/* CONTAINER */
.container{
max-width:1000px;
margin:auto;
padding:20px;
}

/* PLAYER */
.player{
text-align:center;
}

.cover img{
width:100%;
height:300px;
object-fit:cover;
border-radius:15px;
}

/* BUTTON */
button{
padding:10px 15px;
margin:5px;
background:#1db954;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

/* GRID CREW */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:20px;
}

.card{
background:#181818;
border-radius:12px;
overflow:hidden;
text-align:center;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h4{
margin:10px 0 5px;
}

.card p{
font-size:13px;
color:#aaa;
}

/* REQUEST */
.request{
background:#181818;
padding:15px;
border-radius:10px;
margin-top:20px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
background:#222;
border:none;
color:white;
border-radius:6px;
}

/* MOBILE FIX */
@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

.cover img{
height:auto;
}

}

</style>
</head>

<body>

<div class="container">

<!-- PLAYER -->
<div class="player">

<div class="cover">
<img id="cover">
</div>

<h2 id="title">Loading...</h2>

<button onclick="startRadio()">▶ Play</button>
<button onclick="pauseRadio()">❚❚ Pause</button>

</div>

<!-- REQUEST -->
<div class="request">
<h3>🎵 Request Lagu</h3>
<input id="nama" placeholder="Nama">
<input id="lagu" placeholder="Judul lagu">
<button onclick="kirimWA()">Kirim ke WhatsApp</button>
</div>

<!-- CREW -->
<h3>👥 Radio Crew</h3>

<div class="grid">

<div class="card">
<img src="Andi.jpg">
<h4>Andy Hartanto</h4>
<p>Music Director</p>
<p>WA: 0821xxxxxxx</p>
</div>

<div class="card">
<img src="Sheryl.jpg">
<h4>Sheryl</h4>
<p>Music Curator</p>
<p>WA: 0821xxxxxxx</p>
</div>

<div class="card">
<img src="Rina.jpg">
<h4>Miss Selena</h4>
<p>Marketing Director</p>
<p>WA: 0821xxxxxxx</p>
</div>

<div class="card">
<img src="Nandar.jpg">
<h4>Kang Nandar</h4>
<p>Community & Media</p>
<p>WA: 0821xxxxxxx</p>
</div>

<div class="card">
<img src="Denis.jpg">
<h4>Kang Denis</h4>
<p>Support & Crew</p>
<p>WA: 0821xxxxxxx</p>
</div>

</div>

</div>

<audio id="player"></audio>

<script>

/* AUTO DJ */
let tracks=[];
let covers={};
let i=0;

fetch("https://api.github.com/repos/noirsec/Winhart/contents/")
.then(r=>r.json())
.then(data=>{
data.forEach(f=>{
let name=f.name.replace(/\.(mp3|jpg)/i,"");

if(f.name.toLowerCase().endsWith(".mp3")){
tracks.push({title:name,url:f.download_url});
}

if(f.name.toLowerCase().endsWith(".jpg")){
covers[name]=f.download_url;
}
});
});

/* PLAYER */
const player=document.getElementById("player");

function startRadio(){
if(!tracks.length)return;

let t=tracks[i];

player.src=t.url;
player.play().then(()=>{
initAudio(); // aktifkan audio context setelah play
});

title.innerText=t.title;
cover.src=covers[t.title] || "";
}

function pauseRadio(){
player.pause();
}

/* NEXT */
player.onended=()=>{
i++;
if(i>=tracks.length)i=0;
startRadio();
};

/* FIX AUDIO CONTEXT */
let audioCtx, analyser;

function initAudio(){
if(audioCtx) return;

audioCtx = new (window.AudioContext || window.webkitAudioContext)();
analyser = audioCtx.createAnalyser();

let src = audioCtx.createMediaElementSource(player);
src.connect(analyser);
analyser.connect(audioCtx.destination);
}

/* WA */
function kirimWA(){
let nama=document.getElementById("nama").value;
let lagu=document.getElementById("lagu").value;

let text=`Halo Winhart Radio!%0ASaya ${nama}%0ARequest lagu: ${lagu}`;
window.open(`https://wa.me/6282121785751?text=${text}`);
}

</script>

</body>
</html>
