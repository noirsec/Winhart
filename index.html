<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>WINHART RADIO — AUTO DJ</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

.hero{
padding:60px 20px;
}

.hero img{
width:140px;
border-radius:50%;
box-shadow:0 0 30px #ff0050;
}

.player{
margin-top:30px;
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:20px;
display:inline-block;
}

button{
padding:12px 25px;
border:none;
border-radius:8px;
background:#ff0050;
color:white;
margin:10px;
cursor:pointer;
}

#nowPlaying{
margin-top:10px;
font-size:18px;
}

</style>
</head>

<body>

<div class="hero">
<img src="Logo.jpg">
<h1>WINHART RADIO</h1>
<p>Auto DJ Streaming</p>

<div class="player">

<h3 id="nowPlaying">Loading...</h3>

<audio id="radioPlayer" autoplay>
<source id="radioSource">
</audio>

<button onclick="startRadio()">START RADIO</button>

</div>
</div>

<script>

/* =====================
   AUTO DJ STREAM FIX
===================== */

var playlist=[
"https://raw.githubusercontent.com/noirsec/Winhart/main/Kamu%20Adalah%20Cahaya.mp3",
"https://raw.githubusercontent.com/noirsec/Winhart/main/kembali%20ke%20rumah"
];

var titles=[
"Kamu Adalah Cahaya",
"kembali ke rumah"
];

var track=0;
var player=document.getElementById("radioPlayer");
var source=document.getElementById("radioSource");

function playTrack(){

source.src=playlist[track];

player.load();

player.play().then(()=>{
console.log("PLAYING");
}).catch(()=>{
document.getElementById("nowPlaying").innerText="Klik START RADIO";
});

document.getElementById("nowPlaying").innerText="Now Playing: "+titles[track];
}

/* AUTO NEXT */
player.addEventListener("ended",function(){

track++;

if(track>=playlist.length){
track=0;
}

playTrack();

});

/* START BUTTON (WAJIB UNTUK BROWSER) */
function startRadio(){
playTrack();
}

/* AUTO LOAD (COBA PLAY) */
window.addEventListener("load",()=>{
setTimeout(playTrack,1000);
});

</script>

</body>
</html>
