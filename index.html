<script>

/* playlist lagu sementara */

var playlist=[

"https://raw.githubusercontent.com/USERNAME/REPO/main/Harmoni%20Sunyi.mp3",

"https://raw.githubusercontent.com/USERNAME/REPO/main/kamu%20adalah%20cahaya%20versi2.mp3",

"https://raw.githubusercontent.com/USERNAME/REPO/main/Jejak Yang Tertinggal.mp3",

"https://raw.githubusercontent.com/USERNAME/REPO/main/Kembali Ke Rumah.mp3",

"https://raw.githubusercontent.com/USERNAME/REPO/main/masih%20tentang%20kamu.mp3"

];

var player=document.getElementById("radioPlayer");

var current=0;

function startRadio(){

playIntro();

}

function playIntro(){

player.src="radio_intro.mp3";

player.play();

player.onended=function(){

playMusic();

}

}

function playMusic(){

player.src=playlist[current];

player.play();

player.onended=function(){

current++;

if(current>=playlist.length){current=0;}

player.src=playlist[current];

player.play();

}

}

</script>
