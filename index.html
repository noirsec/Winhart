<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WINHART RADIO — PRO</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-VEFS6RS3G3"></script>
<script>
window.dataLayer=window.dataLayer||[];
function gtag(){dataLayer.push(arguments);} 
gtag('js',new Date());
gtag('config','G-VEFS6RS3G3');
</script>

<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:#fff}
nav{background:#000;padding:15px;display:flex;justify-content:space-between}
nav a{color:#fff;margin-left:15px;text-decoration:none}
.section{padding:40px}
.card{background:#151515;padding:20px;border-radius:10px;margin-bottom:20px}
button{padding:10px 20px;background:red;border:none;color:#fff;border-radius:6px;cursor:pointer}
.playerbar{position:fixed;bottom:0;width:100%;background:#000;padding:10px;text-align:center}
</style>
</head>

<body>

<nav>
<div>WINHART RADIO</div>
<div>
<a href="#radio">Live</a>
<a href="#schedule">Schedule</a>
<a href="#crew">Crew</a>
</div>
</nav>

<section id="radio" class="section">
<h2>LIVE RADIO</h2>
<div class="card">
<div id="nowPlaying">OFF AIR</div>
<button onclick="startRadio()">PLAY</button>
<button onclick="pauseRadio()">PAUSE</button>
<audio id="radioPlayer"></audio>
</div>
</section>

<section id="schedule" class="section">
<h2>PROGRAM</h2>
<div class="card">POP HITS</div>
<div class="card">INDIE VIBES</div>
<div class="card">EDM NIGHT</div>
</section>

<section id="crew" class="section">
<h2>CREW</h2>
<div class="card">Andy Hartanto</div>
<div class="card">Sheryl</div>
<div class="card">Selena</div>
</section>

<div class="playerbar">
<span id="miniNow">OFF AIR</span>
</div>

<script>
const playlist=[
"https://raw.githubusercontent.com/noirsec/Winhart/main/Kamu%20Adalah%20Cahaya.mp3",
"https://raw.githubusercontent.com/noirsec/Winhart/main/Kembali%20Ke%20Rumah.mp3"
];

const titles=[
"Kamu Adalah Cahaya",
"Kembali Ke Rumah"
];

let track=0;
const player=document.getElementById("radioPlayer");

function startRadio(){
player.src=playlist[track];
player.play().then(()=>{
document.getElementById("nowPlaying").innerText=titles[track];
document.getElementById("miniNow").innerText=titles[track];
}).catch(e=>console.log(e));
}

function pauseRadio(){player.pause();}

player.addEventListener("ended",()=>{
track=(track+1)%playlist.length;
startRadio();
});
</script>

</body>
</html>
