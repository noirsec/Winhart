<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN WINHART RADIO</title>

<style>
body{
  background:#0f0f0f;
  color:white;
  font-family:sans-serif;
  max-width:600px;
  margin:auto;
  padding:20px;
}

.box{
  background:#181818;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input, button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:6px;
}

button{
  background:#1db954;
  color:white;
  cursor:pointer;
}

h2{
  text-align:center;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

</head>

<body>

<h2>🎛️ ADMIN PANEL</h2>

<div class="box">
  <h3>📡 Status Radio</h3>
  <button onclick="setLive(true)">🟢 SET LIVE</button>
  <button onclick="setLive(false)">🔴 SET OFFLINE</button>
</div>

<div class="box">
  <h3>🖼️ Ganti Banner</h3>
  <input id="bannerInput" placeholder="Link gambar banner">
  <button onclick="updateBanner()">Update Banner</button>
</div>

<div class="box">
  <h3>💬 Reset Chat</h3>
  <button onclick="clearChat()">Hapus Semua Chat</button>
</div>

<script>

// FIREBASE CONFIG (SAMA PERSIS)
const firebaseConfig = {
  apiKey: "AIzaSyBCwucuNtJnzFWXSqfwbK0_mti2sFH6ySk",
  authDomain: "winhart-radio.firebaseapp.com",
  databaseURL: "https://winhart-radio-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "winhart-radio",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// CONTROL LIVE
function setLive(status){
  db.ref("radio_status").set(status);
  alert("Status diubah!");
}

// UPDATE BANNER
function updateBanner(){
  const link = document.getElementById("bannerInput").value;

  if(link=="") return;

  db.ref("banner").set(link);
  alert("Banner diupdate!");
}

// CLEAR CHAT
function clearChat(){
  const today = new Date().toISOString().split("T")[0];
  db.ref("chat/" + today).remove();
  alert("Chat hari ini dihapus!");
}

</script>

</body>
</html>
